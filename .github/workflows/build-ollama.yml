name: Build Ollama ARM64 (Android/Vulkan)

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: 'Versión de Ollama (ej: v0.9.0) — vacío = latest'
        required: false
        default: ''
      attach_to_release:
        description: 'Adjuntar binario al release existente del mismo tag'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # NDK r27c — último LTS estable con soporte Vulkan completo
  NDK_VERSION: r27c
  NDK_URL: https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
  # API level 24 = Android 7.0 mínimo (cubre todos los dispositivos modernos)
  ANDROID_API: 24
  # Target ABI
  ABI: arm64-v8a
  # Go version compatible con Ollama actual
  GO_VERSION: '1.22'

jobs:
  build:
    name: Compile Ollama · Android ARM64 · Vulkan
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ────────────────────────────────────────────────
      # 1. Checkout del fork (contiene lib/patch.sh)
      # ────────────────────────────────────────────────
      - name: Checkout llamux fork
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      # 2. Resolver versión de Ollama
      # ────────────────────────────────────────────────
      - name: Resolve Ollama version
        id: ollama_ver
        run: |
          INPUT="${{ github.event.inputs.ollama_version }}"
          if [ -n "$INPUT" ]; then
            VERSION="$INPUT"
          else
            VERSION=$(curl -fsSL \
              "https://api.github.com/repos/ollama/ollama/releases/latest" \
              | grep '"tag_name"' | head -1 \
              | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Ollama version: $VERSION"

      # ────────────────────────────────────────────────
      # 3. Instalar Go
      # ────────────────────────────────────────────────
      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ────────────────────────────────────────────────
      # 4. Instalar Android NDK
      # ────────────────────────────────────────────────
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        id: ndk
        run: |
          echo "Descargando NDK $NDK_VERSION..."
          curl -fsSL "$NDK_URL" -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d "$HOME"
          rm /tmp/ndk.zip
          NDK_DIR="$HOME/android-ndk-$NDK_VERSION"
          echo "ndk_dir=$NDK_DIR" >> "$GITHUB_OUTPUT"
          echo "NDK listo en: $NDK_DIR"

      # ────────────────────────────────────────────────
      # 5. Dependencias de compilación en Ubuntu
      # ────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libvulkan-dev glslc glslang-tools \
            libglslang-dev spirv-tools \
            ccache

      # ────────────────────────────────────────────────
      # 6. Clonar Ollama en la versión resuelta
      # ────────────────────────────────────────────────
      - name: Clone Ollama ${{ steps.ollama_ver.outputs.version }}
        run: |
          git clone --depth=1 \
            --branch "${{ steps.ollama_ver.outputs.version }}" \
            https://github.com/ollama/ollama.git \
            "$HOME/ollama"
          echo "Ollama clonado: $(git -C $HOME/ollama log --oneline -1)"

      # ────────────────────────────────────────────────
      # 7. Aplicar los 2 parches Android de llamux
      #    (extraídos de lib/patch.sh del repo)
      # ────────────────────────────────────────────────
      - name: Apply llamux Android patches
        run: |
          OLLAMA_DIR="$HOME/ollama"

          echo "=== Patch 1: RUNTIME_DEPENDENCIES (CMakeLists.txt) ==="
          # Buscar todos los CMakeLists con RUNTIME_DEPENDENCIES y eliminarlo
          find "$OLLAMA_DIR" -name "CMakeLists.txt" | while read -r f; do
            if grep -q "RUNTIME_DEPENDENCIES" "$f"; then
              # Elimina el bloque completo install(TARGETS ... RUNTIME_DEPENDENCIES ...)
              python3 - "$f" << 'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path, 'r') as fh:
              content = fh.read()
          # Elimina líneas con RUNTIME_DEPENDENCIES (incluyendo bloque multilínea si lo hay)
          patched = re.sub(
              r'\s*RUNTIME_DEPENDENCIES\b[^\n]*', '', content
          )
          with open(path, 'w') as fh:
              fh.write(patched)
          print(f"  Patched: {path}")
          PYEOF
            fi
          done

          echo "=== Patch 2: ASYNCIO_CONCURRENCY 64 → 1 (vulkan-shaders-gen) ==="
          SHADER_GEN=$(find "$OLLAMA_DIR" -name "vulkan-shaders-gen.cpp" 2>/dev/null | head -1)
          if [ -n "$SHADER_GEN" ]; then
            sed -i 's/ASYNCIO_CONCURRENCY\s*=\s*[0-9]*/ASYNCIO_CONCURRENCY = 1/g' "$SHADER_GEN"
            echo "  Patched: $SHADER_GEN"
            grep "ASYNCIO_CONCURRENCY" "$SHADER_GEN"
          else
            echo "  WARN: vulkan-shaders-gen.cpp no encontrado — puede haber cambiado de ruta"
          fi

          echo "=== Patches aplicados ==="

      # ────────────────────────────────────────────────
      # 8. Configurar ccache para acelerar rebuilds
      # ────────────────────────────────────────────────
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-ollama-${{ steps.ollama_ver.outputs.version }}-arm64
          restore-keys: |
            ccache-ollama-arm64

      # ────────────────────────────────────────────────
      # 9. CMake configure — cross-compile ARM64 + Vulkan
      # ────────────────────────────────────────────────
      - name: CMake configure (ARM64 + Vulkan)
        env:
          NDK_DIR: ${{ steps.ndk.outputs.ndk_dir }}
        run: |
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          OLLAMA_DIR="$HOME/ollama"
          BUILD_DIR="$HOME/ollama-build"

          mkdir -p "$BUILD_DIR"

          # Buscar directorio ggml/llama.cpp dentro de Ollama
          # (puede ser llm/llama.cpp o llm/ggml según versión)
          LLAMA_DIR=$(find "$OLLAMA_DIR" -maxdepth 3 \
            \( -name "CMakeLists.txt" \) \
            -path "*/llm/*" | head -1 | xargs dirname 2>/dev/null || echo "$OLLAMA_DIR/llm")

          echo "Usando directorio llama: $LLAMA_DIR"

          cmake \
            -G Ninja \
            -S "$LLAMA_DIR" \
            -B "$BUILD_DIR" \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI="$ABI" \
            -DANDROID_PLATFORM="android-$ANDROID_API" \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_INSTALL_PREFIX="$HOME/ollama-libs"

      # ────────────────────────────────────────────────
      # 10. Build nativas libs (llama.cpp + Vulkan)
      # ────────────────────────────────────────────────
      - name: Build native libs
        run: |
          cmake --build "$HOME/ollama-build" \
            --config Release \
            --parallel $(nproc) \
            --target install
          echo "=== Libs generadas ==="
          find "$HOME/ollama-libs" -name "*.so" -o -name "*.a" | head -20

      # ────────────────────────────────────────────────
      # 11. Build binario Go (ollama) para Android ARM64
      # ────────────────────────────────────────────────
      - name: Build Go binary (ollama)
        env:
          NDK_DIR: ${{ steps.ndk.outputs.ndk_dir }}
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: '1'
        run: |
          # Toolchain clang del NDK para CGO
          CLANG="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API}-clang"
          export CC="$CLANG"
          export CXX="${CLANG}++"
          export CGO_LDFLAGS="-L$HOME/ollama-libs/lib"
          export CGO_CFLAGS="-I$HOME/ollama-libs/include"

          cd "$HOME/ollama"
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "$HOME/ollama-out/ollama" \
            .

          ls -lh "$HOME/ollama-out/ollama"
          file "$HOME/ollama-out/ollama"

      # ────────────────────────────────────────────────
      # 12. Empaquetar artefacto
      # ────────────────────────────────────────────────
      - name: Package artifact
        run: |
          OLLAMA_VER="${{ steps.ollama_ver.outputs.version }}"
          OUT_DIR="$HOME/ollama-out"
          ARTIFACT_NAME="ollama-android-arm64-vulkan-${OLLAMA_VER}"

          mkdir -p "$OUT_DIR"

          # Copiar libs .so necesarias junto al binario
          find "$HOME/ollama-libs" -name "*.so" \
            -exec cp {} "$OUT_DIR/" \;

          # Info de build
          cat > "$OUT_DIR/BUILD_INFO.txt" << EOF
          Ollama Android ARM64 + Vulkan
          ==============================
          Ollama version : ${OLLAMA_VER}
          NDK version    : $NDK_VERSION
          Android API    : $ANDROID_API
          ABI            : $ABI
          Built by       : GitHub Actions (llamux fork)
          Repo           : ${{ github.repository }}
          Commit         : ${{ github.sha }}
          Build date     : $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Instalación en Termux:
            cp ollama \$PREFIX/bin/ollama
            chmod +x \$PREFIX/bin/ollama
            cp *.so \$PREFIX/lib/
            export OLLAMA_VULKAN=true
          EOF

          # Comprimir
          cd "$HOME"
          tar -czf "${ARTIFACT_NAME}.tar.gz" \
            -C "$OUT_DIR" .

          ls -lh "${ARTIFACT_NAME}.tar.gz"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "artifact_path=$HOME/${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_ENV"

      # ────────────────────────────────────────────────
      # 13. Upload artifact (siempre — descargable desde Actions)
      # ────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ${{ env.artifact_path }}
          retention-days: 30

      # ────────────────────────────────────────────────
      # 14. Adjuntar al GitHub Release
      #     - Siempre si el trigger es un tag v*
      #     - Solo si attach_to_release=true en workflow_dispatch
      # ────────────────────────────────────────────────
      - name: Attach to GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.attach_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.artifact_path }}
          fail_on_unmatched_files: false
